{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-5 mt-4 shadow-sm text-center">
            <h2 class="fw-bold mb-3">Upload Your Resume</h2>
            <p class="text-muted mb-4">Upload your PDF or DOCX file (max 2MB) to get an AI-powered analysis.</p>

            <form method="POST" action="{{ url_for('upload') }}" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-4 text-start">
                    <label class="form-label text-muted fw-bold">Select Resume</label>
                    <input class="form-control form-control-lg" type="file" name="resume" accept=".pdf,.docx" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label text-muted fw-bold">Job Description (Optional)</label>
                    <textarea class="form-control" name="job_description" rows="5"
                        placeholder="Paste the job description here for ATS matching analysis..."></textarea>
                    <div class="form-text">We will compare your resume against this job description and provide a match
                        score.</div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Analyze Resume 🚀</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
